    <text class="ts" x="340" y="507" text-anchor="middle" dominant-baseline="central">Poster, sinopsis, datos</text>
  </g>
  <line x1="340" y1="520" x2="340" y2="556" class="arr" marker-end="url(#arrow)"/>
  <g class="node-amber">
    <rect x="210" y="556" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="577" text-anchor="middle" dominant-baseline="central">Marcar como vista</text>
    <text class="ts" x="340" y="599" text-anchor="middle" dominant-baseline="central">Guarda en historial</text>
  </g>
  <line x1="340" y1="612" x2="340" y2="648" class="arr" marker-end="url(#arrow)"/>
  <g class="node-amber">
    <rect x="210" y="648" width="260" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="670" text-anchor="middle" dominant-baseline="central">Actualiza retos y XP</text>
