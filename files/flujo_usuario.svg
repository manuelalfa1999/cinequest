    <text class="th" x="340" y="121" text-anchor="middle" dominant-baseline="central">Tiene cuenta?</text>
    <text class="ts" x="340" y="143" text-anchor="middle" dominant-baseline="central">Comprueba sesion</text>
  </g>
  <line x1="230" y1="128" x2="130" y2="128" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="178" y="120" text-anchor="middle">No</text>
  <g class="node-teal">
