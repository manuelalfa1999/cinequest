    <text class="ts" x="340" y="415" text-anchor="middle" dominant-baseline="central">Catalogo, recomendador, perfil</text>
  </g>
  <line x1="210" y1="400" x2="130" y2="400" class="arr" marker-end="url(#arrow)"/>
  <line x1="470" y1="400" x2="550" y2="400" class="arr" marker-end="url(#arrow)"/>
  <line x1="340" y1="428" x2="340" y2="464" class="arr" marker-end="url(#arrow)"/>
  <g class="node-teal">
    <rect x="40" y="372" width="180" height="56" rx="8" stroke-width="0.5"/>
