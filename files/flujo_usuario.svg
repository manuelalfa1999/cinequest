    <text class="th" x="130" y="121" text-anchor="middle" dominant-baseline="central">Registro</text>
    <text class="ts" x="130" y="143" text-anchor="middle" dominant-baseline="central">Crea cuenta nueva</text>
  </g>
  <path d="M130 156 L130 185 L340 185 L340 156" fill="none" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="450" y="120" text-anchor="middle">Si</text>
  <line x1="340" y1="156" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>
  <g class="node-teal">
