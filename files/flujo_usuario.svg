<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #333; }
      .th { font-size: 14px; font-weight: 700; }
      .ts { font-size: 12px; fill: #555; }
      .node-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .node-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .node-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .node-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .node-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .arr { stroke: #666; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <g class="node-gray">
    <rect x="240" y="20" width="200" height="44" rx="22" stroke-width="0.5"/>
    <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Usuario accede</text>
  </g>
  <line x1="340" y1="64" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>
  <g class="node-purple">
