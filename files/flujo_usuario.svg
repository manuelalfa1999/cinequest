    <text class="th" x="340" y="301" text-anchor="middle" dominant-baseline="central">Home</text>
    <text class="ts" x="340" y="323" text-anchor="middle" dominant-baseline="central">Populares, estrenos</text>
  </g>
  <line x1="340" y1="336" x2="340" y2="372" class="arr" marker-end="url(#arrow)"/>
  <g class="node-purple">
